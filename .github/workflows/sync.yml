name: Upstream Sync

permissions:
  contents: write
  issues: write
  actions: write

on:
  schedule:
    - cron: '0 * * * *' # every hour
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - uses: actions/checkout@v4

      - name: Clean issue notice
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issues'
          labels: '🚨 Sync Fail'

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: CorentinTh/it-tools
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }} # automatically generated, no need to set
          test_mode: false

      - name: Get latest commit from upstream
        id: latest_commit
        run: |
          git fetch origin main
          echo "::set-output name=commit_sha::$(git rev-parse origin/main)"

      - name: Compare commits
        id: compare_commits
        uses: juliangruber/merge-commit-action@v1
        with:
          base: main
          head: ${{ steps.latest_commit.outputs.commit_sha }}

      - name: Trigger Deploy to Halo
        if: steps.compare_commits.outputs.pull_requests != ''
        uses: actions/github-script@0.9.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const response = await octokit.actions.createWorkflowDispatch({
              owner: 'your_repo_owner',
              repo: 'your_repo_name',
              workflow_id: 'workflow_id_of_Deploy_to_Halo_workflow',
              ref: 'main', // or whatever branch your workflow is on
            });
            console.log(response);
